# 缩略图宽度/高度 (像素)
max_width=360
max_height=200

# 硬解设置，默认为no (软解)，设为yes则使用硬解
hwdec=yes

# 启用网络视频的缩略图，yes或no
network=yes

# 音频文件启用缩略图，yes或no
audio=no

# 缩略图质量，2是较好的质量和性能平衡点
quality=2

# 最小视频时长，低于此值的视频不生成缩略图，单位为秒
min_duration=30

# 生成缩略图的精确度，越高越精确但生成速度越慢，范围0-2
# 0为最快速度但精度低，2为最高精度但速度慢
precise=1

# 软解线程数
sw_threads=4

# 是否优先生成当前播放位置的缩略图
spawn_first=yes 